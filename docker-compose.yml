version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: app-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: app-client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server